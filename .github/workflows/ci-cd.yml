name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Lint, build & deploy to Netlify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # `npm run build` runs `tsc -b` (type-check) then `vite build`.
      # VITE_* vars are inlined at build time, so they must be present here.
      - name: Build
        run: npm run build
        env:
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_AUTOREPLY_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_AUTOREPLY_TEMPLATE_ID }}

      # Production deploy — only on push to main
      - name: Deploy to Netlify (production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: >
          npx --yes netlify-cli@17 deploy
          --dir=dist
          --prod
          --site="$NETLIFY_SITE_ID"
          --auth="$NETLIFY_AUTH_TOKEN"
          --message="Production deploy — ${{ github.sha }}"
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      # Draft/preview deploy — on pull requests
      - name: Deploy to Netlify (preview)
        if: github.event_name == 'pull_request'
        run: >
          npx --yes netlify-cli@17 deploy
          --dir=dist
          --site="$NETLIFY_SITE_ID"
          --auth="$NETLIFY_AUTH_TOKEN"
          --message="Preview — PR #${{ github.event.number }} (${{ github.sha }})"
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}